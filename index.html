<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Calculator</title>
</head>
<body>
    <main class="container">
        <div id="calc-display" class="display">

        </div>

        <div class="buttons-grid">
            <button id="AC" class="ac">AC</button>
            <button id="divide" class="operator">/</button>
            <button id="multiplication" class="operator">X</button>
            <button id="plus" class="operator">+</button>
            <button id="minus" class="operator">-</button>

            <button id="one">1</button>
            <button id="two">2</button>
            <button id="three">3</button>
            <button id="four">4</button>
            <button id="five">5</button>
            <button id="six">6</button>
            <button id="seven">7</button>
            <button id="eight">8</button>
            <button id="nine">9</button>
            <button id="zero">0</button>
            <button id="dot">.</button>

            <button id="equal" class="equal">=</button>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
